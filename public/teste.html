<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico — Coffee & Beats</title>
</head>
<body style="background:#3B2415;color:#F6F0E5;padding:32px;font-family:sans-serif;text-align:center;margin:0">
  <h1 style="font-size:2rem;margin-bottom:8px">☕ Coffee &amp; Beats</h1>
  <p style="font-size:1.1rem;color:#C8853A;margin-bottom:24px">Página de diagnóstico</p>

  <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:20px;margin:0 auto;max-width:500px;text-align:left">
    <p><strong>✅ HTML estático carregou!</strong></p>
    <p id="ua" style="word-break:break-all;font-size:0.8rem;color:#ccc;margin-top:8px"></p>
    <p id="chrome" style="margin-top:8px"></p>
    <p id="js" style="margin-top:8px;color:#4ade80">✅ JavaScript funcionando</p>
    <p id="promise" style="margin-top:8px"></p>
    <p id="fetch" style="margin-top:8px"></p>
  </div>

  <div style="margin-top:24px">
    <a href="/api/health" style="color:#C8853A;font-size:0.9rem">→ Testar /api/health (JSON)</a>
    <br/><br/>
    <a href="/" style="color:#C8853A;font-size:0.9rem">→ Ir para o sistema</a>
  </div>

  <script>
    try {
      document.getElementById('ua').textContent = 'User Agent: ' + navigator.userAgent
    } catch(e) {}

    try {
      var isChrome = !!window.chrome || /Chrome/.test(navigator.userAgent)
      var chromeVer = (navigator.userAgent.match(/Chrome\/(\d+)/) || [])[1]
      document.getElementById('chrome').textContent =
        'Chrome: ' + (isChrome ? 'SIM (v' + (chromeVer || '?') + ')' : 'NÃO detectado')
    } catch(e) {}

    try {
      Promise.resolve('ok').then(function(v) {
        document.getElementById('promise').textContent = '✅ Promises funcionando'
      })
    } catch(e) {
      document.getElementById('promise').textContent = '❌ Promises com erro: ' + e
    }

    try {
      fetch('/api/health').then(function(r) {
        return r.json()
      }).then(function(data) {
        document.getElementById('fetch').textContent =
          '✅ Fetch OK — /api/health: ' + JSON.stringify(data.ok)
      }).catch(function(e) {
        document.getElementById('fetch').textContent = '❌ Fetch erro: ' + e
      })
    } catch(e) {
      document.getElementById('fetch').textContent = '❌ Fetch não suportado: ' + e
    }
  </script>
</body>
</html>
