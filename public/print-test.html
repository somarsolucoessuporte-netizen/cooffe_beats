<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Teste Impressora</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; }
  button { display:block; width:100%; padding:16px; margin:8px 0;
           font-size:16px; border:none; border-radius:8px; cursor:pointer; }
  .ok { background:#16a34a; color:#fff; }
  .info { background:#1d4ed8; color:#fff; }
  .warn { background:#d97706; color:#fff; }
  pre { background:#222; padding:10px; border-radius:6px;
        font-size:11px; overflow-x:auto; white-space:pre-wrap; }
</style>
</head>
<body>
<h2>🖨️ Diagnóstico Impressora</h2>
<div id="status"></div>

<button class="warn" onclick="testarServidor()">0. Testar Servidor Local (localhost:9100)</button>
<button class="ok"   onclick="imprimirViaHttp()">0b. Imprimir via HTTP (localhost:9100)</button>
<button class="info" onclick="diagnostico()">1. Verificar Plugin Capacitor</button>
<button class="ok"   onclick="testarImpressao()">2. Imprimir via Plugin</button>
<button class="info" onclick="verWindow()">3. Ver window.Capacitor</button>

<pre id="log">Aguardando...</pre>

<script>
const logEl = document.getElementById('log');
const log = (msg) => {
  logEl.textContent += '\n' + msg;
  console.log(msg);
};

async function testarServidor() {
  log('--- TESTE SERVIDOR LOCAL ---');
  log('Testando http://localhost:9100/status ...');
  try {
    const r = await fetch('http://localhost:9100/status', {
      signal: AbortSignal.timeout(3000)
    });
    const data = await r.json();
    log('✅ Servidor OK: ' + JSON.stringify(data));
  } catch(e) {
    log('❌ Falhou: ' + e.message);
    log('Tipo: ' + e.constructor.name);
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      log('→ Servidor não está rodando ou porta bloqueada');
      log('→ Abra o app CB Print Server e confirme que está verde');
    } else if (e.message.includes('CORS') || e.message.includes('cors')) {
      log('→ Problema de CORS — verificar headers do servidor');
    } else if (e.message.includes('timeout') || e.message.includes('AbortError')) {
      log('→ Timeout — servidor demorou mais de 3s para responder');
    } else {
      log('→ Erro desconhecido: ' + e.name + ' / ' + e.message);
    }
  }
}

async function imprimirViaHttp() {
  log('--- IMPRESSÃO VIA HTTP ---');
  log('Enviando POST para http://localhost:9100/print ...');
  try {
    const r = await fetch('http://localhost:9100/print', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        numeroPedido: 'HTML-TEST',
        itens: [
          { nome: 'Cafe Expresso', quantidade: 1, preco: 5.00 },
          { nome: 'Pao de Queijo', quantidade: 2, preco: 8.00 }
        ],
        total: 13.00,
        via: 'CLIENTE',
        nomeCliente: 'Teste HTML',
        metodoPagamento: 'PIX'
      }),
      signal: AbortSignal.timeout(5000)
    });
    const data = await r.json();
    log('✅ Resultado: ' + JSON.stringify(data));
  } catch(e) {
    log('❌ Erro no POST: ' + e.message);
    log('Tipo: ' + e.constructor.name);
  }
}

function diagnostico() {
  log('--- DIAGNÓSTICO CAPACITOR ---');
  log('window.Capacitor: ' + typeof window.Capacitor);
  log('isNative: ' + window.Capacitor?.isNativePlatform?.());
  log('Plugins: ' + JSON.stringify(Object.keys(window.Capacitor?.Plugins || {})));
  log('SunmiPrinter: ' + typeof window.Capacitor?.Plugins?.SunmiPrinter);

  try {
    const { Capacitor } = window;
    log('Capacitor ok: ' + !!Capacitor);
  } catch(e) {
    log('Erro Capacitor: ' + e.message);
  }
}

function verWindow() {
  log('--- WINDOW KEYS ---');
  const keys = Object.keys(window).filter(k =>
    k.toLowerCase().includes('sunmi') ||
    k.toLowerCase().includes('print') ||
    k.toLowerCase().includes('capacitor')
  );
  log(JSON.stringify(keys));
}

async function testarImpressao() {
  log('--- TESTE IMPRESSÃO CAPACITOR ---');
  const P = window.Capacitor?.Plugins?.SunmiPrinter;
  if (!P) {
    log('❌ SunmiPrinter não encontrado');
    log('Tentando via CapacitorCustomPlatform...');
    log(JSON.stringify(window.CapacitorCustomPlatform));
    return;
  }
  try {
    log('✅ Plugin encontrado, iniciando...');
    await P.enterPrinterBuffer({ clean: true });
    await P.setAlignment({ alignment: 'center' });
    await P.setBold({ enable: true });
    await P.printText({ text: 'COFFEE & BEATS\n' });
    await P.printText({ text: 'TESTE OK!\n' });
    await P.setBold({ enable: false });
    await P.lineWrap({ lines: 3 });
    await P.exitPrinterBuffer({ commit: true });
    log('✅ Impresso com sucesso!');
  } catch(e) {
    log('❌ Erro: ' + e.message);
    log(JSON.stringify(e));
  }
}

window.addEventListener('load', () => setTimeout(testarServidor, 500));
</script>
</body>
</html>
